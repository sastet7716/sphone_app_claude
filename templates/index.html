<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>チェックボックス保存アプリ</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 2rem;
      }
      .container {
        max-width: 420px;
        padding: 1rem 1.2rem;
        border: 1px solid #ddd;
        border-radius: 8px;
      }
      h1 {
        margin-top: 0;
        font-size: 1.2rem;
      }
      .status {
        margin: 0.5rem 0 0.8rem;
        color: #555;
        font-size: 0.95rem;
      }
      .error {
        margin: 0.5rem 0 0.8rem;
        color: #b00020;
      }
      .choice-group label {
        display: block;
        margin: 0.6rem 0;
      }
      .choice-group label.is-disabled {
        color: #888;
      }
      .field {
        margin: 0.5rem 0;
      }
      input[type="text"],
      input[type="password"] {
        width: 100%;
        box-sizing: border-box;
        padding: 0.45rem;
      }
      button {
        margin-top: 0.8rem;
        padding: 0.5rem 0.9rem;
        border: 1px solid #999;
        border-radius: 6px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container">
      {% if login_id %}
        <h1>4つの選択肢（いずれか1つまで・他ユーザー選択済みは不可）</h1>
        <div class="status">ログイン中: {{ login_id }}</div>
        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}
        {% if no_slot_available %}
          <div class="error">
            現在、どの項目も空いていません（4つとも他ユーザーが使用中です）。
          </div>
        {% endif %}
        <form method="post">
          <div class="choice-group">
            <label class="{% if 'check1' in choice_owners %}is-disabled{% endif %}">
              <input
                type="radio"
                name="choice"
                value="check1"
                {% if selected_choice == 'check1' %}checked{% endif %}
                {% if 'check1' in choice_owners %}disabled{% endif %}
              />
              チェック 1{% if 'check1' in choice_owners %}（{{ choice_owners['check1'] }}さんが使用中）{% endif %}
            </label>
            <label class="{% if 'check2' in choice_owners %}is-disabled{% endif %}">
              <input
                type="radio"
                name="choice"
                value="check2"
                {% if selected_choice == 'check2' %}checked{% endif %}
                {% if 'check2' in choice_owners %}disabled{% endif %}
              />
              チェック 2{% if 'check2' in choice_owners %}（{{ choice_owners['check2'] }}さんが使用中）{% endif %}
            </label>
            <label class="{% if 'check3' in choice_owners %}is-disabled{% endif %}">
              <input
                type="radio"
                name="choice"
                value="check3"
                {% if selected_choice == 'check3' %}checked{% endif %}
                {% if 'check3' in choice_owners %}disabled{% endif %}
              />
              チェック 3{% if 'check3' in choice_owners %}（{{ choice_owners['check3'] }}さんが使用中）{% endif %}
            </label>
            <label class="{% if 'check4' in choice_owners %}is-disabled{% endif %}">
              <input
                type="radio"
                name="choice"
                value="check4"
                {% if selected_choice == 'check4' %}checked{% endif %}
                {% if 'check4' in choice_owners %}disabled{% endif %}
              />
              チェック 4{% if 'check4' in choice_owners %}（{{ choice_owners['check4'] }}さんが使用中）{% endif %}
            </label>
          </div>
          <button type="submit" {% if no_slot_available %}disabled{% endif %}>保存</button>
        </form>
        <form method="post" action="/logout">
          <button type="submit">ログアウト</button>
        </form>
      {% else %}
        <h1>ログイン</h1>
        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login">
          <div class="field">
            <label for="login_id">ログインID</label>
            <input id="login_id" type="text" name="login_id" required />
          </div>
          <div class="field">
            <label for="password">パスワード</label>
            <input id="password" type="password" name="password" required />
          </div>
          <button type="submit">ログイン</button>
        </form>
      {% endif %}
    </div>
  </body>
</html>
